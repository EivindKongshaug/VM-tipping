<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tippeliga Live</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #080c14;
  color: #e8eaf0;
}

.header {
  text-align: center;
  padding: 20px;
  background: #0f1c30;
  border-bottom: 1px solid #1a2a40;
}

.title {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 2px;
}

.sub {
  font-size: 12px;
  color: #7a8ba8;
}

.btn {
  margin-top: 10px;
  padding: 6px 12px;
  background: #c8a84b22;
  border: 1px solid #c8a84b55;
  color: #c8a84b;
  border-radius: 8px;
  cursor: pointer;
}

.card {
  background: #0f1520;
  border: 1px solid #1a2840;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
}

.gold {
  color: #c8a84b;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">⚽ TIPPELIGA LIVE</div>
  <div class="sub" id="status">Starter...</div>
  <button class="btn" onclick="fetchLive()">↻ Oppdater</button>
</div>

<div id="app"></div>

<script>

const API_KEY = "234985fb7b4a22f79103b10751c61806"; // 👈 LIM INN API KEY HER

const PLAYERS = ["Staals","Kong","Dox","Jojo","Marko","Barra"];

const MATCHES = [
{id:1,home:"Mexico",away:"South Africa",tips:["3-0","2-1","2-0","3-1","2-1","3-0"]},
{id:2,home:"South Korea",away:"Czech Republic",tips:["2-1","1-1","1-1","2-3","1-0","1-2"]},
{id:3,home:"Canada",away:"Bosnia",tips:["1-1","0-1","2-1","2-0","1-1","2-0"]},
{id:4,home:"United States",away:"Paraguay",tips:["2-1","1-1","0-0","2-3","3-0","2-1"]},
{id:5,home:"Qatar",away:"Switzerland",tips:["0-3","0-3","0-1","1-3","0-2","0-3"]},
{id:6,home:"Brazil",away:"Morocco",tips:["2-2","1-1","3-1","2-2","2-1","2-1"]}
];

let results = {};

function normalize(str){
  return str.toLowerCase()
    .replaceAll(" ", "")
    .replaceAll("-", "")
    .replaceAll(".", "");
}

function points(actual, tip){
  if(!actual) return 0;
  if(actual === tip) return 4;

  const a = actual.split("-").map(Number);
  const t = tip.split("-").map(Number);

  const ra = Math.sign(a[0]-a[1]);
  const rt = Math.sign(t[0]-t[1]);

  return ra === rt ? 2 : 0;
}

async function fetchLive(){

  document.getElementById("status").innerText = "Henter live data...";

  try {
    const res = await fetch(
      "https://corsproxy.io/?https://v3.football.api-sports.io/fixtures?season=2026&status=FT",
      {
        headers: {
          "x-apisports-key": API_KEY
        }
      }
    );

    const data = await res.json();

    const updated = {...results};

    data.response.forEach(fx => {

      const home = normalize(fx.teams.home.name);
      const away = normalize(fx.teams.away.name);
      const score = `${fx.goals.home}-${fx.goals.away}`;

      const match = MATCHES.find(m =>
        normalize(m.home) === home && normalize(m.away) === away
      );

      if(match){
        updated[match.id] = score;
      }
    });

    results = updated;
    render();

    document.getElementById("status").innerText =
      "Oppdatert: " + new Date().toLocaleTimeString();

  } catch(e){
    console.log(e);
    document.getElementById("status").innerText =
      "Feil ved henting (API/CORS)";
  }
}

function render(){

  const scores = PLAYERS.map((p, i) => {

    let total = 0;

    MATCHES.forEach(m => {
      if(results[m.id]){
        total += points(results[m.id], m.tips[i]);
      }
    });

    return {p,total};

  }).sort((a,b)=>b.total-a.total);

  document.getElementById("app").innerHTML =
    scores.map((s,i)=>`
      <div class="card">
        <div class="row">
          <div>${i+1}. ${s.p}</div>
          <div class="gold">${s.total} pts</div>
        </div>
      </div>
    `).join("");
}

// AUTO UPDATE
fetchLive();
setInterval(fetchLive, 60000);

</script>

</body>
</html>
