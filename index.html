<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM 2026 Live Tipping</title>

<style>
body { margin:0; font-family:system-ui; background:#0b1220; color:white; }
header { padding:18px; text-align:center; background:#111a2e; }
h1 { margin:0; font-size:20px; }
.small { font-size:12px; color:#9aa4b2; }

.card { background:#151f35; margin:10px; padding:12px; border-radius:10px; }
.leader { border:2px solid gold; }

.row { display:flex; justify-content:space-between; }
</style>
</head>

<body>

<header>
<h1>⚽ VM 2026 LIVE Tipping</h1>
<p class="small">Oppdateres automatisk hvert 60 sek</p>
</header>

<div id="app"></div>

<script>

/* =========================
   
   ========================= */
const API_KEY = "234985fb7b4a22f79103b10751c61806";

/* 👆👆👆 DU KOPIERER API KEY FRA DASHBOARD
   og limer den inn mellom hermetegnene */

/* ========================= */

const PLAYERS = ["Staals","Kong","Dox","Jojo","Marko","Barra"];

/* DINE KAMPER (forkortet men fungerer – kan utvides til alle 72 hvis du vil senere) */
const MATCHES = [
{id:1,home:"Mexico",away:"South Africa",tips:["3-0","2-1","2-0","3-1","2-1","3-0"]},
{id:2,home:"South Korea",away:"Czech Republic",tips:["2-1","1-1","1-1","2-3","1-0","1-2"]},
{id:3,home:"Canada",away:"Bosnia-Herzegovina",tips:["1-1","0-1","2-1","2-0","1-1","2-0"]},
{id:4,home:"United States",away:"Paraguay",tips:["2-1","1-1","0-0","2-3","3-0","2-1"]},
{id:5,home:"Qatar",away:"Switzerland",tips:["0-3","0-3","0-1","1-3","0-2","0-3"]},
{id:6,home:"Brazil",away:"Morocco",tips:["2-2","1-1","3-1","2-2","2-1","2-1"]}
];

let results = {};

/* =========================
   🔴 LIVE HENTING
   ========================= */
async function fetchLive() {
  try {
    const res = await fetch(
      "https://v3.football.api-sports.io/fixtures?season=2026",
      {
        headers: {
          "x-apisports-key": API_KEY   // 👈 HER BRUKES API-KODEN DIN
        }
      }
    );

    const data = await res.json();

    data.response.forEach(m => {
      if (m.fixture.status.short !== "FT") return;

      const home = m.teams.home.name;
      const away = m.teams.away.name;
      const score = m.goals.home + "-" + m.goals.away;

      const match = MATCHES.find(x =>
        x.home === home && x.away === away
      );

      if (match) results[match.id] = score;
    });

    render();
  } catch (e) {
    console.log("API feil", e);
  }
}

/* =========================
   📊 POENGSYSTEM
   ========================= */
function points(actual, tip) {
  if (!actual) return 0;

  if (actual === tip) return 4;

  const a = actual.split("-").map(Number);
  const t = tip.split("-").map(Number);

  const resA = Math.sign(a[0] - a[1]);
  const resT = Math.sign(t[0] - t[1]);

  return resA === resT ? 2 : 0;
}

/* =========================
   🏆 RENDER TABELL
   ========================= */
function render() {
  const scores = PLAYERS.map((p,i)=>{
    let total = 0;

    MATCHES.forEach(m=>{
      if(results[m.id]) {
        total += points(results[m.id], m.tips[i]);
      }
    });

    return {p,total};
  }).sort((a,b)=>b.total-a.total);

  document.getElementById("app").innerHTML =
    scores.map((s,i)=>`
      <div class="card ${i===0?'leader':''}">
        <div class="row">
          <b>${i+1}. ${s.p}</b>
          <b>${s.total} pts</b>
        </div>
      </div>
    `).join("");
}

/* =========================
   🚀 START AUTO-OPPDATERING
   ========================= */
fetchLive();
setInterval(fetchLive, 60000);

</script>

</body>
</html>
